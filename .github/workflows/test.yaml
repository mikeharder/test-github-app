name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - run: npm ci --no-audit --no-fund --prefer-offline

      - run: npm ls -a || true

      - run: npm run test:ci

      - run: npm run lint

      - run: npm run format:check:ci
