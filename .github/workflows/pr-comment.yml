name: PR Comment

on:
  pull_request:
  issue_comment:
    types: [created]

permissions:
  pull-requests: write

jobs:
  comment:
    if: >
      github.event_name == 'pull_request' ||
      (github.event.issue.pull_request != null && contains(github.event.comment.body, 'trigger'))
    runs-on: ubuntu-slim
    steps:
      - name: Add comment to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          TRIGGER_TIME: ${{ github.event.comment.created_at || github.event.pull_request.created_at }}
        run: |
          current_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          trigger_epoch=$(date -u -d "$TRIGGER_TIME" +%s)
          current_epoch=$(date -u -d "$current_time" +%s)
          gap=$((current_epoch - trigger_epoch))
          body=$(printf 'Triggering comment time: %s\nCurrent time: %s\nGap (seconds): %s' "$TRIGGER_TIME" "$current_time" "$gap")
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$body"
