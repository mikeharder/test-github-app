name: PR Comment

on:
  pull_request:
  issue_comment:
    types: [created]

permissions:
  pull-requests: write

jobs:
  comment:
    if: >
      github.event_name == 'pull_request' ||
      (github.event.issue.pull_request != null && github.event.comment.user.login == 'mikeharder')
    runs-on: ubuntu-slim
    steps:
      - name: Add comment to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "test comment from github action"
