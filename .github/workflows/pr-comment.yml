name: PR Comment

on:
  pull_request:

permissions:
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-slim
    steps:
      - name: Add comment to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "test comment from github action"
